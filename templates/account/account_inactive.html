<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account Inactive</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#556B2F",
            "primary-dark": "#8C9985",
            "background-light": "#FAF9EE",
            accent: "#DCCFC0",
            subtle: "#EEEEEE",
            "text-main": "#2C332B",
            "text-muted": "#6B7280",
            brandBlue: "#2874F0",
            brandOrange: "#F97316",
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
          },
          boxShadow: {
            soft: "0 20px 40px -10px rgba(162, 175, 155, 0.15)",
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: "Inter", sans-serif; }
  </style>
</head>
<body class="bg-background-light text-text-main min-h-screen flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(85,107,47,0.12),_transparent_55%)]"></div>

  <div class="relative w-full max-w-lg">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-[2px] rounded-3xl"></div>
    <div class="relative bg-white rounded-3xl shadow-soft border border-accent/30 p-8 sm:p-10">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-primary/15 text-primary flex items-center justify-center">
          <span class="material-symbols-outlined text-[22px]">lock_person</span>
        </div>
        <div class="font-bold text-xl tracking-wide">
          <span class="text-brandBlue">Buy</span><span class="text-brandOrange">Next</span>
        </div>
      </div>

      <h1 class="text-2xl sm:text-3xl font-bold mb-2">Account Inactive</h1>
      <p class="text-text-muted leading-relaxed">
        Your account is currently inactive. Please contact the admin or support team to reactivate your access.
      </p>

      <div class="mt-8 flex flex-col sm:flex-row gap-3">
        <a href="{% url 'login' %}"
           class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl bg-primary text-white font-bold shadow-sm hover:bg-primary-dark transition-all">
          <span class="material-icons text-[18px]">arrow_back</span>
          Back to Login
        </a>
      </div>

      <div class="mt-6 text-xs text-text-muted">
        If you believe this is a mistake, please include your registered email or phone number when contacting support.
      </div>
    </div>
  </div>
</body>
</html>
